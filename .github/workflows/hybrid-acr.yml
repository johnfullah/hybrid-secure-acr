name: Hybrid-Secure-ACR

# CI-native wrapper for the six-gate pipeline (proposal RO3 / WP4 primary artefact).
# Runs on pull requests so the gate decision maps onto merge control:
#   PASS (exit 0) -> green check       (auto-merge allowed)
#   ESCALATE (1)  -> neutral/failed    (human-in-the-loop required, RTA Theme 6)
#   BLOCK (2)     -> failed            (hard stop, no override except logged exception)

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      config:
        description: "Pipeline configuration arm"
        default: "hybrid"
        type: choice
        options: [ hybrid, sast-only, llm-augmented ]

permissions:
  contents: read
  pull-requests: write   # to post the findings summary as a PR comment

jobs:
  acr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (incl. real SAST tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Capture untrusted PR text (injection surface for G2)
        id: prtext
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # PR title + body travel WITH the change and are screened by Gate 2.
          printf '%s\n%s' "$PR_TITLE" "$PR_BODY" > .acr_prtext.txt

      - name: Run Hybrid-Secure-ACR pipeline
        id: scan
        env:
          # Switch to a real model by setting these as repo secrets/vars:
          #   ACR_LLM_BACKEND=anthropic  and  ANTHROPIC_API_KEY=...
          ACR_LLM_BACKEND: ${{ vars.ACR_LLM_BACKEND || 'mock' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ACR_LLM_MODEL: ${{ vars.ACR_LLM_MODEL || 'claude-sonnet-4-6' }}
        run: |
          set +e
          python -m hybrid_acr.cli scan . \
            --config "${{ github.event.inputs.config || 'hybrid' }}" \
            --pr-text "$(cat .acr_prtext.txt)" \
            --ledger audit/ledger.jsonl \
            --json > acr_report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Also print human-readable to the job log.
          python -m hybrid_acr.cli scan . \
            --config "${{ github.event.inputs.config || 'hybrid' }}" \
            --pr-text "$(cat .acr_prtext.txt)" \
            --ledger /tmp/throwaway.jsonl || true

      - name: Verify audit ledger integrity (RTA Theme 5)
        run: python -m hybrid_acr.cli verify-ledger audit/ledger.jsonl

      - name: Upload audit ledger + report (replication package)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acr-audit-trail
          path: |
            audit/ledger.jsonl
            acr_report.json

      - name: Comment findings on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('acr_report.json', 'utf8'));
            const icon = {PASS:'✅', ESCALATE:'⚠️', BLOCK:'⛔', ABORT:'⛔'}[r.decision] || '❓';
            let body = `### ${icon} Hybrid-Secure-ACR: **${r.decision}** (config: ${r.config})\n\n`;
            body += `| Gate | Decision | Findings |\n|---|---|---|\n`;
            for (const g of r.gate_results) {
              body += `| ${g.gate_id} ${g.gate_name} | ${g.decision} | ${g.findings.length} |\n`;
            }
            body += `\n**Total findings:** ${r.summary.total_findings} · `;
            body += `**Max severity:** ${r.summary.max_severity}`;
            if (r.aborted_at) body += ` · **Halted at:** ${r.aborted_at}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });

      - name: Enforce gate decision
        run: |
          code="${{ steps.scan.outputs.exit_code }}"
          echo "Pipeline exit code: $code"
          if [ "$code" = "2" ]; then echo "::error::ACR BLOCK - merge prohibited."; exit 1; fi
          if [ "$code" = "1" ]; then echo "::warning::ACR ESCALATE - human review required."; exit 1; fi
          echo "ACR PASS."
